name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compilation
        run: python -m py_compile monitor.py legifrance.py digest.py make_og.py test_monitor.py
      - name: Tests
        run: python -m unittest -v
